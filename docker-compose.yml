services:
  gemini-api:
    image: cooooookk/gemini-business2api:latest
    container_name: gemini-business2api
    # 使用host网络模式,让容器可以访问宿主机的127.0.0.1:1083代理
    network_mode: "host"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 日志限制
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 环境变量:确保代理配置生效
    environment:
      - NO_PROXY=localhost,127.0.0.1
